<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="360" rx="28" fill="#050014"/>

  <circle cx="145" cy="95" r="95" fill="#8B5CF6" opacity="0.32">
    <animate attributeName="cx" values="145;190;145" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="95;125;95" dur="6s" repeatCount="indefinite"/>
  </circle>

  <circle cx="1010" cy="95" r="125" fill="#E879F9" opacity="0.25">
    <animate attributeName="cx" values="1010;950;1010" dur="7s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="95;130;95" dur="7s" repeatCount="indefinite"/>
  </circle>

  <circle cx="690" cy="290" r="150" fill="#818CF8" opacity="0.22">
    <animate attributeName="cx" values="690;745;690" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="290;260;290" dur="8s" repeatCount="indefinite"/>
  </circle>

  <g opacity="0.22">
    <line x1="0" y1="60" x2="1200" y2="60" stroke="#FFFFFF"/>
    <line x1="0" y1="120" x2="1200" y2="120" stroke="#FFFFFF"/>
    <line x1="0" y1="180" x2="1200" y2="180" stroke="#FFFFFF"/>
    <line x1="0" y1="240" x2="1200" y2="240" stroke="#FFFFFF"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke="#FFFFFF"/>
    <line x1="120" y1="0" x2="120" y2="360" stroke="#FFFFFF"/>
    <line x1="240" y1="0" x2="240" y2="360" stroke="#FFFFFF"/>
    <line x1="360" y1="0" x2="360" y2="360" stroke="#FFFFFF"/>
    <line x1="480" y1="0" x2="480" y2="360" stroke="#FFFFFF"/>
    <line x1="600" y1="0" x2="600" y2="360" stroke="#FFFFFF"/>
    <line x1="720" y1="0" x2="720" y2="360" stroke="#FFFFFF"/>
    <line x1="840" y1="0" x2="840" y2="360" stroke="#FFFFFF"/>
    <line x1="960" y1="0" x2="960" y2="360" stroke="#FFFFFF"/>
    <line x1="1080" y1="0" x2="1080" y2="360" stroke="#FFFFFF"/>
  </g>

  <g>
    <rect x="770" y="95" width="250" height="160" rx="18" fill="#0F172A" stroke="#C084FC" opacity="0.92">
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 -10; 0 0" dur="4s" repeatCount="indefinite"/>
    </rect>

    <rect x="800" y="125" width="190" height="18" rx="9" fill="#8B5CF6"/>
    <rect x="800" y="158" width="140" height="14" rx="7" fill="#C084FC" opacity="0.8"/>
    <rect x="800" y="187" width="165" height="14" rx="7" fill="#E879F9" opacity="0.75"/>
    <rect x="800" y="216" width="110" height="14" rx="7" fill="#818CF8" opacity="0.75"/>
  </g>

  <text x="-650" y="125" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="58" font-weight="900">
    Salman Arefin
    <animate attributeName="x" values="-650;90;90" dur="2.6s" keyTimes="0;0.65;1" fill="freeze"/>
  </text>

  <text x="-850" y="180" fill="#C084FC" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700">
    Software Engineer | Full-Stack Web Developer
    <animate attributeName="x" values="-850;93;93" dur="3.1s" keyTimes="0;0.7;1" fill="freeze"/>
  </text>

  <text x="-900" y="232" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="500">
    React.js • Next.js • NestJS • ASP.NET • Laravel • MySQL • PostgreSQL
    <animate attributeName="x" values="-900;94;94" dur="3.5s" keyTimes="0;0.75;1" fill="freeze"/>
  </text>

  <circle cx="1080" cy="280" r="6" fill="#FFFFFF" opacity="0.8">
    <animate attributeName="cy" values="280;245;280" dur="3s" repeatCount="indefinite"/>
  </circle>

  <circle cx="1125" cy="215" r="5" fill="#C084FC" opacity="0.9">
    <animate attributeName="cy" values="215;250;215" dur="4s" repeatCount="indefinite"/>
  </circle>

  <circle cx="1045" cy="195" r="4" fill="#E879F9" opacity="0.9">
    <animate attributeName="cy" values="195;225;195" dur="3.5s" repeatCount="indefinite"/>
  </circle>
</svg>
